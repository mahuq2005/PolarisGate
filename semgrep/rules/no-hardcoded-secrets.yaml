rules:
  - id: no-hardcoded-secrets
    patterns:
      - pattern-either:
          - pattern: |
              $VAR = "$SECRET"
          - pattern: |
              $VAR = '$SECRET'
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i).*(secret|password|token|key|credential|api_key|apikey|auth).*
      - metavariable-regex:
          metavariable: $SECRET
          regex: ^(?!(CHANGE_ME|your-|placeholder|test_|example)).{10,}$
    message: >
      Hardcoded secret detected in variable '$VAR'.
      Use environment variables or Docker secrets instead.
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
    paths:
      exclude:
        - tests/
        - scripts/
        - "*.example.*"
        - "*.md"
