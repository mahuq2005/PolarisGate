<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolarisGate — AI Governance</title>
<link rel="stylesheet" href="/css/styles.css?v=4">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='2' y1='2' x2='30' y2='30'%3E%3Cstop offset='0%25' stop-color='%234F8EF7'/%3E%3Cstop offset='100%25' stop-color='%237C8BB5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='14' stroke='url(%23g)' stroke-width='1.2' fill='none' opacity='0.4'/%3E%3Cpath d='M16 3 L18.5 14 L16 16 L13.5 14 Z' fill='url(%23g)' opacity='0.9'/%3E%3Cpath d='M16 29 L18.5 18 L16 16 L13.5 18 Z' fill='url(%23g)' opacity='0.9'/%3E%3Cpath d='M3 16 L14 13.5 L16 16 L14 18.5 Z' fill='url(%23g)' opacity='0.7'/%3E%3Cpath d='M29 16 L18 13.5 L16 16 L18 18.5 Z' fill='url(%23g)' opacity='0.7'/%3E%3Crect x='14' y='14' width='4' height='4' rx='1' fill='%23F1F5F9' transform='rotate(45 16 16)'/%3E%3C/svg%3E">
</head>
<body>

<div id="login-screen" class="screen">
  <div class="login-card">
    <div class="logo">
      <svg width="32" height="32" viewBox="0 0 32 32"><defs><linearGradient id="lg" x1="2" y1="2" x2="30" y2="30"><stop offset="0%" stop-color="#38BDF8"/><stop offset="100%" stop-color="#818CF8"/></linearGradient></defs><circle cx="16" cy="16" r="14" stroke="url(#lg)" stroke-width="1.2" opacity="0.25"/><path d="M16 3 L18.5 14 L16 16 L13.5 14 Z" fill="url(#lg)" opacity="0.9"/><path d="M16 29 L18.5 18 L16 16 L13.5 18 Z" fill="url(#lg)" opacity="0.9"/><path d="M3 16 L14 13.5 L16 16 L14 18.5 Z" fill="url(#lg)" opacity="0.7"/><path d="M29 16 L18 13.5 L16 16 L18 18.5 Z" fill="url(#lg)" opacity="0.7"/><rect x="14" y="14" width="4" height="4" rx="1" fill="#F1F5F9" transform="rotate(45 16 16)"/></svg>
    </div>
    <h1 id="login-title">PolarisGate</h1>
    <p id="login-subtitle" class="subtitle">AI Governance & Runtime Control</p>
    <div class="form-group">
      <label id="login-email-label">Email</label>
      <input type="email" id="login-email" placeholder="admin@polarisgate.ai" autocomplete="email" aria-label="Email">
    </div>
    <div class="form-group">
      <label id="login-password-label">Password</label>
      <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" aria-label="Password">
    </div>
    <button id="login-btn" class="btn-primary" onclick="handleLogin()" aria-label="Login">Login</button>
    <p id="login-error" class="error-msg"></p>
  </div>
</div>

<div id="dashboard-screen" class="screen hidden">
  <header class="header">
    <div class="header-left">
      <svg width="24" height="24" viewBox="0 0 32 32"><defs><linearGradient id="lgh" x1="2" y1="2" x2="30" y2="30"><stop offset="0%" stop-color="#38BDF8"/><stop offset="100%" stop-color="#818CF8"/></linearGradient></defs><circle cx="16" cy="16" r="14" stroke="url(#lgh)" stroke-width="1.2" opacity="0.25"/><path d="M16 3 L18.5 14 L16 16 L13.5 14 Z" fill="url(#lgh)" opacity="0.9"/><path d="M16 29 L18.5 18 L16 16 L13.5 18 Z" fill="url(#lgh)" opacity="0.9"/></svg>
      <span id="header-brand" class="brand">PolarisGate</span>
    </div>
    <nav class="tabs" id="main-tabs"></nav>
    <button class="btn-logout" id="btn-logout" onclick="handleLogout()">Logout</button>
  </header>
  <div class="main-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content" id="main-content"></main>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="/js/i18n.js?v=2"></script>
<script src="/js/app.js?v=8"></script>
</body>
</html>
