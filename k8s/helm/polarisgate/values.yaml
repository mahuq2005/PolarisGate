# PolarisGate Helm Chart Values
# Enterprise-grade: security contexts, resource limits, autoscaling, secrets

image:
  repository: ghcr.io/polarisgate
  tag: latest
  pullPolicy: Always

# Global settings applied to all deployments
global:
  environment: production
  # Secrets should be stored in a Kubernetes Secret or external secrets manager
  # These are just references - actual values come from --set or values file
  postgres:
    host: postgres
    port: 5432
    database: polarisgate
  redis:
    host: redis
    port: 6379

# Service-specific configurations
services:
  gateway:
    port: 8000
    replicas: 2
    image: gateway
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: "500m"
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]

  guardrails:
    port: 8005
    replicas: 2
    image: guardrails
    env:
      PII_HYBRID_ENABLED: "true"
      OLLAMA_URL: "http://ollama:11434"
      TOXIC_MODEL_NAME: "llama3.2:1b"
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]

  collector:
    port: 8006
    replicas: 1
    image: collector
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: "500m"
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]

  aida-bridge:
    port: 8001
    replicas: 1
    image: aida-bridge
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: "500m"
        memory: 512Mi
    autoscaling:
