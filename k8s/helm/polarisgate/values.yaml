# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: polarisgate.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: gateway
        - path: /
          pathType: Prefix
          service: frontend
  tls:
    - hosts:
        - polarisgate.example.com
      secretName: polarisgate-tls

# Monitoring
monitoring:
  enabled: true
  prometheus:
    scrapeInterval: 15s
  grafana:
    enabled: false

# Database
postgresql:
  enabled: true
  auth:
    database: polarisgate
    username: polarisgate
  primary:
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
    persistence:
      size: 10Gi

redis:
  enabled: true
  auth:
    enabled: true
  architecture: standalone
  master:
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: "500m"
        memory: 512Mi
    persistence:
      size: 5Gi
