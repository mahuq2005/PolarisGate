{{- if .Values.secrets.create | default false }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db-secret
  labels:
    {{- include "polarisgate.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ printf "postgresql://%s:%s@%s:%d/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password .Values.global.postgres.host .Values.global.postgres.port .Values.global.postgres.database | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-redis-secret
  labels:
    {{- include "polarisgate.labels" . | nindent 4 }}
type: Opaque
stringData:
  redis-password: {{ .Values.redis.auth.password | default "" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-jwt-secret
  labels:
    {{- include "polarisgate.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ .Values.jwt.secret | default "" | quote }}
{{- end }}
