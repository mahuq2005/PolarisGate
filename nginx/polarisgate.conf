# PolarisGate Nginx Reverse Proxy Configuration
# Enterprise-grade: TLS termination, rate limiting, security headers, WAF, and caching
# OWASP ASVS v4.0 compliant | ModSecurity-ready

# Rate limiting zones (must be at http level)
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static:10m rate=500r/s;
limit_req_zone $http_authorization zone=per_user:10m rate=30r/s;

# Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/x-javascript
    image/svg+xml
    font/woff
    font/woff2;

upstream gateway {
    server gateway:8000;
}

upstream frontend {
    server frontend:3000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name polarisgate.local;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name polarisgate.local;

    # TLS configuration (production: use Let's Encrypt or corporate CA)
    ssl_certificate /etc/nginx/certs/polarisgate.crt;
    ssl_certificate_key /etc/nginx/certs/polarisgate.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!DES:!RC4:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security headers (OWASP ASVS v4.0 compliant)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://polarisgate.local http://localhost:3000 wss://polarisgate.local; form-action 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Request size limits
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;

    # ─── WAF: Block common attack patterns ──────────────────────────────

    # Block SQL injection patterns in URI
    if ($request_uri ~* "(union.*select|select.*from|insert\s+into|delete\s+from|drop\s+table|exec\s*\(|xp_cmdshell|sp_executesql)") {
        return 403;
    }

    # Block XSS patterns in URI
    if ($request_uri ~* "(<script|<iframe|<object|<embed|<svg.*onload|javascript:|onerror=|onclick=|alert\(|prompt\(|confirm\()") {
        return 403;
    }

    # Block path traversal
    if ($request_uri ~* "(\.\./|\.\.\\|/etc/passwd|/etc/shadow|/proc/self/environ|/windows/win.ini)") {
        return 403;
    }

    # Block command injection
    if ($request_uri ~* "(;\s*(rm|cat|bash|sh|wget|curl|powershell|cmd)\s|\||`[^`]+`|\$\{.*\}") {
        return 403;
    }

    # Block null byte injection
    if ($request_uri ~* "%00") {
        return 403;
    }

    # Block common scanners and bots
    if ($http_user_agent ~* "(sqlmap|nikto|acunetix|nessus|openvas|burpsuite|nmap|masscan|zgrab|wpscan|joomscan|dirbuster|gobuster|hydra|medusa)") {
        return 403;
    }

    # Block requests with no user agent
    if ($http_user_agent = "") {
        return 403;
    }

    # ─── Rate limiting by user (via Authorization header hash) ──────────
    # This creates a per-user rate limit based on their JWT/API key hash
    # The $http_authorization variable is hashed by nginx automatically

    # API Gateway proxy
    location /api/ {
        limit_req zone=api burst=200 nodelay;
        limit_req zone=per_user burst=50 nodelay;
        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $request_id;
        
        # CORS headers
        add_header Access-Control-Allow-Origin "https://polarisgate.local" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Correlation-Id, X-CSRF-Token, X-API-Key" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Expose-Headers "X-Correlation-Id, X-RateLimit-Limit, X-RateLimit-Remaining" always;
        
        # Handle preflight
        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Auth endpoints (stricter rate limiting)
    location /auth/ {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health endpoint (no auth required)
    location /health {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket endpoints
    location /ws/ {
        proxy_pass http://gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # Frontend static files
    location / {
        limit_req zone=static burst=1000 nodelay;
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp|avif)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Deny access to internal paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(node_modules|__pycache__|\.git|\.env|\.aws|\.ssh|config\.json|credentials\.json) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to common sensitive files
    location ~* (docker-compose\.yml|Dockerfile|Makefile|\.env\.example|\.gitignore|pyproject\.toml|requirements\.txt) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Access and error logs
    access_log /var/log/nginx/polarisgate_access.log;
    error_log /var/log/nginx/polarisgate_error.log;
}
